<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        .order-container {
            max-width: 1000px;
            margin: 20px auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .order-header {
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: grid;
            grid-template-columns: 3fr 1fr 2fr 2fr 2fr 1fr;
            align-items: center;
        }

        .order-item {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: grid;
            grid-template-columns: 3fr 1fr 2fr 2fr 2fr 1fr;
            align-items: center;
            transition: transform 0.2s;
        }

        .order-item:hover {
            transform: translateX(5px);
        }

        .order-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }

        .order-item-info {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>
<div class="order-container">
    <!-- 订单头部 -->
    <div class="order-header">
        <div>商品信息</div>
        <div>单价</div>
        <div>数量</div>
        <div>总价</div>
        <div>操作</div>
    </div>

    <!-- 订单列表（动态生成） -->
    <div id="order-list"></div>

    <!-- 无订单提示 -->
    <div id="no-orders" style="display: none; padding: 20px; text-align: center;">暂无订单</div>
</div>

<script>
    // 从本地存储获取订单数据
    const orders = JSON.parse(localStorage.getItem('orders')) || [];

    function renderOrders() {
        const orderList = document.getElementById('order-list');
        const noOrders = document.getElementById('no-orders');

        orderList.innerHTML = '';

        if (orders.length === 0) {
            noOrders.style.display = 'block';
        } else {
            noOrders.style.display = 'none';
            orders.forEach(order => {
                const orderItem = document.createElement('div');
                orderItem.classList.add('order-item');
                const totalPrice = order.price * order.quantity;
                orderItem.innerHTML = `
                        <div class="order-item-info">
                            <img src="${order.productImage}" alt="${order.productName}">
                            <div>
                                <p>${order.productName}</p>
                            </div>
                        </div>
                        <div class="price">$${order.price.toFixed(2)}</div>
                        <div class="price">${order.quantity}</div>
                        <div class="price">$${totalPrice.toFixed(2)}</div>
                        <div><button onclick="cancelOrder(${order.id})">取消订单</button></div>
                    `;
                orderList.appendChild(orderItem);
            });
        }
    }

    function refreshOrders() {
        // 这里可以添加实际的刷新逻辑，例如从服务器获取最新订单数据
        renderOrders();
    }

    function cancelOrder(orderId) {
        // 这里可以添加实际的取消订单逻辑，例如发送请求到服务器取消订单
        const newOrders = orders.filter(order => order.id!== orderId);
        orders.length = 0;
        newOrders.forEach(order => orders.push(order));
        localStorage.setItem('orders', JSON.stringify(orders));
        renderOrders();
    }

    // 页面加载时渲染订单
    window.addEventListener('load', renderOrders);
</script>
</body>
</html>
